<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeBot - Login</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111; padding: 20px; border: 1px solid #00ff41; box-shadow: 0 0 15px #00ff4166; width: 300px; }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #00ff41; color: #00ff41; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ff41; color: #000; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00cc33; }
        .error { color: #ff0000; font-size: 0.8em; margin-bottom: 10px; display: none; }
        .link { text-align: center; margin-top: 15px; font-size: 0.8em; }
        a { color: #00ff41; text-decoration: none; border-bottom: 1px solid transparent; }
        a:hover { border-bottom: 1px solid #00ff41; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>System Access</h2>
        <div id="error" class="error">Invalid credentials</div>
        <input type="text" id="username" placeholder="USERNAME" autocomplete="off">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="login()">Enter System</button>
        <div class="link">
            No account? <a href="/register">Register</a>
        </div>
    </div>

    <script>
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await response.json();
                if (data.ok) {
                    localStorage.setItem('tradebot_token', data.token);
                    window.location.href = '/';
                } else {
                    errorDiv.innerText = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.innerText = 'Connection error';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
